[package]
name = "ecstest"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.18", default-features = false, features = ["bevy_state", "multi_threaded", "serialize"] }
bevy_replicon = { version = "0.39", default-features = false, features = ["server", "client"] }
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.49.0", features = ["full"] }
rand = "0.9"
crossterm = { version = "0.29", features = ["event-stream"] }
futures-util = "0.3"
clap = { version = "4", features = ["derive"] }
tokio-util = "0.7"
roam = "0.6.0"
roam-stream = "0.6.0"
facet = "0.43"
seldom_state = { git = "https://github.com/Wiwip/seldom_state.git", rev = "cc6c89f" }
